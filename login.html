<!DOCTYPE html>
<html lang="zh-CN" data-theme="classic" data-font="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 墨韵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/ink-theme.css">
    <style>
        /* ===== Footer ===== */
        .site-footer { position: relative; z-index: 10; border-top: 1px solid var(--ink-border); padding: 30px 20px 20px; margin-top: 40px; text-align: center; }
        .site-footer p { font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-muted); line-height: 1.8; }
        .site-footer .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
        .site-footer .footer-links a { font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none; transition: color 0.3s; }
        .site-footer .footer-links a:hover { color: var(--ink-text); }
        [data-theme="dark"] .site-footer { border-top-color: rgba(235,225,215,0.1); }

        /* 登录页特有：印章用 absolute 定位（不随页面滚动） */
        .ink-seal-login {
            position: absolute; bottom: 30px; right: 40px; width: 60px; height: 60px;
            border: 2px solid var(--ink-seal-color); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Ma Shan Zheng', cursive; font-size: 18px; color: var(--ink-seal-color);
            transform: rotate(-8deg); opacity: 0.7;
            background: radial-gradient(circle, rgba(255,253,245,0.2) 0%, transparent 80%);
        }
    </style>
</head>
<body>
    <div class="min-h-screen w-full relative overflow-hidden">
        <div id="background" class="parallax-bg absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('public/background.jpg')"></div>

        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div class="ink-scatter scatter-brush-1"></div><div class="ink-scatter scatter-brush-2"></div>
            <div class="ink-scatter scatter-brush-3"></div><div class="ink-scatter scatter-brush-4"></div>
            <div class="ink-dot" style="top: 12%; left: 25%;"></div>
            <div class="ink-dot" style="top: 25%; right: 20%; width: 6px; height: 6px;"></div>
            <div class="ink-dot" style="bottom: 30%; left: 15%; width: 10px; height: 10px;"></div>
            <div class="ink-dot" style="bottom: 15%; right: 25%;"></div>
        </div>

        <nav class="ink-nav">
            <div class="flex items-center justify-between max-w-6xl mx-auto">
                <a href="index.html" class="ink-nav-brand">墨韵</a>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="ink-nav-link">首页</a>
                    <a href="login.html" class="ink-nav-link active">登录</a>
                    <a href="register.html" class="ink-nav-link">注册</a>
                </div>
            </div>
        </nav>

        <div class="relative z-10 min-h-screen flex items-center justify-center p-4" style="padding-top: 100px;">
            <div class="page-enter max-w-lg w-full px-8 py-12 relative">
                <div class="text-center mb-12">
                    <h2 class="brush-title text-6xl text-gray-800 mb-4 tracking-wider">欢迎回来</h2>
                    <p class="text-gray-700 text-xl" style="font-family: 'ZCOOL XiaoWei', serif; opacity: 0.7;">请登录您的账户</p>
                    <div class="ink-divider mx-auto" style="width: 60%; margin-top: 25px;"></div>
                </div>

                <div id="messageBox" class="hidden"></div>

                <form id="loginForm" class="space-y-10">
                    <div class="relative">
                        <label for="email" class="ink-write-label">邮箱地址</label>
                        <input id="email" name="email" type="email" autocomplete="email" required class="ink-write-input w-full" placeholder="在此处书写您的邮箱" />
                        <p class="ink-hint-text">请输入您注册时使用的邮箱地址</p>
                    </div>
                    <div class="relative">
                        <label for="password" class="ink-write-label">密码</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="ink-write-input w-full" placeholder="请输入密码" />
                        <p class="ink-hint-text">密码长度不少于6位</p>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="ink-write-checkbox" />
                            <label for="remember-me" class="ml-3 text-gray-700 cursor-pointer" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 15px;">记住我</label>
                        </div>
                        <a href="#" class="ink-write-link" onclick="event.preventDefault(); showToast('请联系管理员重置密码', 3000);">忘记密码?</a>
                    </div>
                    <div class="text-center pt-4">
                        <button type="submit" class="ink-write-btn">登 录</button>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-700" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; opacity: 0.7;">
                            还没有账户?
                            <a href="register.html" class="ink-write-link font-medium">立即注册</a>
                        </p>
                    </div>
                </form>

                <div class="ink-seal-login">墨<br/>韵</div>
            </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script>
        // 加载已保存的邮箱
        (function() {
            var savedEmail = getSavedEmail();
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember-me').checked = true;
            }
        })();

        function showError(message) {
            var mb = document.getElementById('messageBox');
            mb.innerHTML = '<div class="ink-error-box ink-message-enter"><span class="ink-error-text">' + message + '</span></div>';
            mb.classList.remove('hidden');
            setTimeout(function() { hideMessage(); }, 4000);
        }

        function showSuccess(message) {
            var mb = document.getElementById('messageBox');
            mb.innerHTML = '<div class="ink-success-box ink-message-enter"><span class="ink-success-text">' + message + '</span></div>';
            mb.classList.remove('hidden');
            setTimeout(function() { hideMessage(); }, 3000);
        }

        function hideMessage() {
            var mb = document.getElementById('messageBox');
            var el = mb.querySelector('.ink-error-box, .ink-success-box');
            if (el) {
                el.classList.remove('ink-message-enter');
                el.classList.add('ink-message-exit');
                setTimeout(function() { mb.classList.add('hidden'); mb.innerHTML = ''; }, 300);
            }
        }

        // ========== 登录提交（含密码验证） ==========
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var rememberMe = document.getElementById('remember-me').checked;
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email) { showError('请输入邮箱地址'); return; }
            if (!emailRegex.test(email)) { showError('请输入有效的邮箱地址'); return; }
            if (!password) { showError('请输入密码'); return; }
            if (password.length < 6) { showError('密码长度至少为6位'); return; }

            // ★ 关键：验证密码是否与注册时一致
            var users = getRegisteredUsers();
            var matchedUser = null;
            for (var i = 0; i < users.length; i++) {
                if (users[i].email === email && users[i].password === password) {
                    matchedUser = users[i];
                    break;
                }
            }

            // 检查邮箱是否已注册
            var emailExists = users.some(function(u) { return u.email === email; });

            if (!emailExists) {
                showError('该邮箱尚未注册，请先注册账户');
                return;
            }

            if (!matchedUser) {
                showError('密码错误，请重新输入');
                return;
            }

            // 登录成功
            saveAuth(email, rememberMe);
            showSuccess('登录成功！正在跳转...');
            setTimeout(function() { window.location.href = 'index.html'; }, 1500);
        });
    </script>

    <!-- ===== Footer ===== -->
    <div class="site-footer" style="position: relative; z-index: 10; border-top: 1px solid var(--ink-border); padding: 30px 20px 20px; margin-top: 40px; text-align: center;">
        <div class="footer-links" style="display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap;">
            <a href="index.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">首页</a>
            <a href="login.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">登录</a>
            <a href="register.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">注册</a>
        </div>
        <p style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-muted); line-height: 1.8;">© 2024 墨韵 · 水墨书法分享社区 &nbsp;|&nbsp; 传承中华文化，感悟笔墨之美</p>
        <p style="font-family: 'ZCOOL XiaoWei', serif; font-size: 12px; color: var(--ink-text-muted); opacity: 0.6; margin-top: 4px;">本网站仅供学习交流使用</p>
    </div>
</body>
</html>
