<!DOCTYPE html>
<html lang="zh-CN" data-theme="classic" data-font="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 墨韵</title>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles/moyun.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>.input-container { position: relative; }
        .site-footer { position: relative; z-index: 10; border-top: 1px solid var(--ink-border); padding: 30px 20px 20px; margin-top: 40px; text-align: center; }
        .site-footer p { font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-muted); line-height: 1.8; }
        .site-footer .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
        .site-footer .footer-links a { font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none; transition: color 0.3s; }
        .site-footer .footer-links a:hover { color: var(--ink-text); }
        [data-theme="dark"] .site-footer { border-top-color: rgba(235,225,215,0.1); }
    </style>
</head>
<body>
    <div class="min-h-screen w-full relative overflow-hidden">
        <div id="background" class="parallax-bg absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('public/background.webp')"></div>
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div class="ink-scatter scatter-brush-1"></div><div class="ink-scatter scatter-brush-2"></div>
            <div class="ink-scatter scatter-brush-3"></div><div class="ink-scatter scatter-brush-4"></div>
            <div class="ink-dot" style="top: 12%; left: 25%;"></div>
            <div class="ink-dot" style="top: 25%; right: 20%; width: 6px; height: 6px;"></div>
            <div class="ink-dot" style="bottom: 30%; left: 15%; width: 10px; height: 10px;"></div>
            <div class="ink-dot" style="bottom: 15%; right: 25%;"></div>
        </div>
        <nav class="ink-nav">
            <div class="flex items-center justify-between max-w-6xl mx-auto">
                <a href="index.html" class="ink-nav-brand">墨韵</a>
                <button class="nav-toggle" id="navToggle" onclick="toggleNav()" aria-label="菜单">
                    <span></span><span></span><span></span>
                </button>
                <div class="nav-links" id="navLinks">
                    <a href="index.html" class="ink-nav-link">首页</a>
                    <a href="login.html" class="ink-nav-link">登录</a>
                    <a href="register.html" class="ink-nav-link active">注册</a>
                </div>
            </div>
        </nav>
        <div class="relative z-10 min-h-screen flex items-center justify-center p-4" style="padding-top: 100px;">
            <div class="page-enter max-w-lg w-full px-8 py-12 relative">
                <div class="text-center mb-12">
                    <h2 class="brush-title text-6xl text-gray-800 mb-4 tracking-wider">创建账户</h2>
                    <p class="text-gray-700 text-xl" style="font-family: 'ZCOOL XiaoWei', serif; opacity: 0.7;">加入我们，探索水墨之美</p>
                    <div class="ink-divider mx-auto" style="width: 60%; margin-top: 25px;"></div>
                </div>
                <div id="messageBox" class="hidden"></div>
                <form id="registerForm" class="space-y-10">
                    <div class="relative input-container">
                        <label for="username" class="ink-write-label">用户名</label>
                        <input id="username" name="username" type="text" required autocomplete="off" class="ink-write-input w-full" placeholder="请输入用户名" />
                        <p class="ink-hint-text">用户名长度应在2-20个字符之间</p>
                        <div class="ink-error-tooltip" id="username-error"></div>
                    </div>
                    <div class="relative input-container">
                        <label for="email" class="ink-write-label">邮箱地址</label>
                        <input id="email" name="email" type="email" required autocomplete="off" class="ink-write-input w-full" placeholder="请输入邮箱地址" />
                        <p class="ink-hint-text">我们将使用此邮箱与您联系</p>
                        <div class="ink-error-tooltip" id="email-error"></div>
                    </div>
                    <div class="relative input-container">
                        <label for="password" class="ink-write-label">密码</label>
                        <input id="password" name="password" type="password" required autocomplete="new-password" class="ink-write-input w-full" placeholder="请输入密码" />
                        <p class="ink-hint-text">密码长度至少为6位</p>
                        <div class="ink-error-tooltip" id="password-error"></div>
                    </div>
                    <div class="relative input-container">
                        <label for="confirmPassword" class="ink-write-label">确认密码</label>
                        <input id="confirmPassword" name="confirmPassword" type="password" required autocomplete="new-password" class="ink-write-input w-full" placeholder="请再次输入密码" />
                        <p class="ink-hint-text">请确保两次输入的密码一致</p>
                        <div class="ink-error-tooltip" id="confirmPassword-error"></div>
                    </div>
                    <div style="position: relative;">
                        <div class="flex items-start">
                            <input id="agreement" name="agreement" type="checkbox" required class="ink-write-checkbox mt-1" />
                            <label for="agreement" class="ml-3 text-gray-700 cursor-pointer" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 14px;">
                                我已阅读并同意
                                <a href="#" class="ink-write-link" onclick="event.preventDefault(); showToast('《用户协议》详情请访问官方网站查阅', 3000);">《用户协议》</a>
                                和
                                <a href="#" class="ink-write-link" onclick="event.preventDefault(); showToast('《隐私政策》详情请访问官方网站查阅', 3000);">《隐私政策》</a>
                            </label>
                        </div>
                        <div style="position: absolute; bottom: -24px; left: 0; font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: rgba(139,69,19,0.9); display: none; align-items: center; gap: 4px;" id="agreement-error"></div>
                    </div>
                    <div class="text-center pt-4">
                        <button type="submit" class="ink-write-btn">注 册</button>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-700" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; opacity: 0.7;">
                            已有账户?
                            <a href="login.html" class="ink-write-link font-medium">立即登录</a>
                        </p>
                    </div>
                </form>
                <div class="ink-seal-login" style="position: absolute; bottom: 30px; right: 40px; width: 60px; height: 60px; border: 2px solid var(--ink-seal-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Ma Shan Zheng', cursive; font-size: 18px; color: var(--ink-seal-color); transform: rotate(-8deg); opacity: 0.7; background: radial-gradient(circle, rgba(255,253,245,0.2) 0%, transparent 80%);">墨<br/>韵</div>
            </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script>
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function showFieldError(fieldId, message) {
            var input = document.getElementById(fieldId);
            var errorDiv = document.getElementById(fieldId + '-error');
            if (input && errorDiv) {
                input.classList.add('error');
                errorDiv.textContent = message;
                errorDiv.style.display = 'flex';
                errorDiv.style.animation = 'fadeInInk 0.3s ease-out forwards';
            }
        }

        function hideFieldError(fieldId) {
            var input = document.getElementById(fieldId);
            var errorDiv = document.getElementById(fieldId + '-error');
            if (input && errorDiv) { input.classList.remove('error'); errorDiv.style.display = 'none'; }
        }

        function hideAllErrors() {
            ['username','email','password','confirmPassword','agreement'].forEach(function(f) { hideFieldError(f); });
        }

        function showSuccess(message) {
            var mb = document.getElementById('messageBox');
            mb.innerHTML = '<div class="ink-success-box ink-message-enter"><span class="ink-success-text">' + message + '</span></div>';
            mb.classList.remove('hidden');
        }

        // 实时验证
        document.getElementById('username').addEventListener('input', function() {
            var v = this.value.trim();
            if (v.length > 0 && (v.length < 2 || v.length > 20)) showFieldError('username', '用户名长度应在2-20个字符之间');
            else hideFieldError('username');
        });
        document.getElementById('email').addEventListener('input', function() {
            var v = this.value.trim();
            if (v.length > 0 && !emailRegex.test(v)) showFieldError('email', '请输入有效的邮箱地址');
            else hideFieldError('email');
        });
        document.getElementById('password').addEventListener('input', function() {
            var v = this.value;
            if (v.length > 0 && v.length < 6) showFieldError('password', '密码长度至少为6位');
            else hideFieldError('password');
            var cp = document.getElementById('confirmPassword').value;
            if (cp.length > 0 && v !== cp) showFieldError('confirmPassword', '两次输入的密码不一致');
            else if (cp.length > 0) hideFieldError('confirmPassword');
        });
        document.getElementById('confirmPassword').addEventListener('input', function() {
            var v = this.value;
            var p = document.getElementById('password').value;
            if (v.length > 0 && v !== p) showFieldError('confirmPassword', '两次输入的密码不一致');
            else hideFieldError('confirmPassword');
        });
        document.getElementById('agreement').addEventListener('change', function() { hideFieldError('agreement'); });

        // 提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var agreement = document.getElementById('agreement').checked;

            hideAllErrors();
            var hasError = false;

            if (!username) { showFieldError('username', '请输入用户名'); hasError = true; }
            else if (username.length < 2 || username.length > 20) { showFieldError('username', '用户名长度应在2-20个字符之间'); hasError = true; }
            if (!email) { showFieldError('email', '请输入邮箱地址'); hasError = true; }
            else if (!emailRegex.test(email)) { showFieldError('email', '请输入有效的邮箱地址'); hasError = true; }
            if (!password) { showFieldError('password', '请输入密码'); hasError = true; }
            else if (password.length < 6) { showFieldError('password', '密码长度至少为6位'); hasError = true; }
            if (!confirmPassword) { showFieldError('confirmPassword', '请再次输入密码'); hasError = true; }
            else if (password !== confirmPassword) { showFieldError('confirmPassword', '两次输入的密码不一致'); hasError = true; }
            if (!agreement) { showFieldError('agreement', '请阅读并同意协议'); hasError = true; }
            if (hasError) return;

            // 保存到 localStorage
            try {
                var users = getRegisteredUsers();
                if (users.some(function(u) { return u.email === email; })) {
                    showFieldError('email', '该邮箱已被注册');
                    return;
                }
                users.push({ username: username, email: email, password: password, registeredAt: new Date().toISOString() });
                localStorage.setItem('moyun_users', JSON.stringify(users));
            } catch(ex) { console.warn('无法保存用户数据', ex); }

            showSuccess('注册成功！正在跳转至登录页...');
            setTimeout(function() { window.location.href = 'login.html'; }, 1500);
        });
    </script>

    <!-- ===== Footer ===== -->
    <div class="site-footer" style="position: relative; z-index: 10; border-top: 1px solid var(--ink-border); padding: 30px 20px 20px; margin-top: 40px; text-align: center;">
        <div class="footer-links" style="display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap;">
            <a href="index.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">首页</a>
            <a href="login.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">登录</a>
            <a href="register.html" style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-secondary); text-decoration: none;">注册</a>
        </div>
        <p style="font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; color: var(--ink-text-muted); line-height: 1.8;">© 2024 墨韵 · 水墨书法分享社区 &nbsp;|&nbsp; 传承中华文化，感悟笔墨之美</p>
        <p style="font-family: 'ZCOOL XiaoWei', serif; font-size: 12px; color: var(--ink-text-muted); opacity: 0.6; margin-top: 4px;">本网站仅供学习交流使用</p>
    </div>
</body>
</html>
